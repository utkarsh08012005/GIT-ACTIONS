  #actions are reusable code provided by github that perform common tasks like clone a repo or setup node



name: Actions
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: list files
        run: ls -al