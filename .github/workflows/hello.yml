name: test workflows

on: 
  push:
    branches: [ master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm i
      - name: Run tests
        run: npm test
  deploy_app:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: deploy
        run: echo "Deployed"